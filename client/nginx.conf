server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # A variable proxy_pass forces re-resolution via Docker's DNS (127.0.0.11)
    # on every request, instead of caching server's IP once at startup — needed
    # so a recreated server container doesn't 502 until nginx itself restarts.
    resolver 127.0.0.11 valid=10s;
    set $server_upstream server:8080;

    location /api/ {
        # A variable proxy_pass disables nginx's path-rewrite, so forward
        # $request_uri explicitly instead.
        proxy_pass http://$server_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Mirrors Helmet's headers (which only cover /api) — scoped to this
        # location since add_header doesn't merge with upstream headers.
        add_header Content-Security-Policy "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline'" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer always;
        add_header X-XSS-Protection 0 always;
        # allow-popups: this page opens the Google login popup and must keep a handle to it.
        add_header Cross-Origin-Opener-Policy same-origin-allow-popups always;
        add_header Cross-Origin-Resource-Policy same-origin always;

        try_files $uri $uri/ /index.html;
    }

    # unsafe-none: the Google popup returns here, and any other COOP severs window.opener.
    # Headers repeated because add_header does not merge across location blocks.
    location = /auth/callback {
        add_header Content-Security-Policy "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data:;object-src 'none';script-src 'self';script-src-attr 'none';style-src 'self' https: 'unsafe-inline'" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer always;
        add_header X-XSS-Protection 0 always;
        add_header Cross-Origin-Opener-Policy unsafe-none always;
        add_header Cross-Origin-Resource-Policy same-origin always;

        try_files /index.html =404;
    }
}
