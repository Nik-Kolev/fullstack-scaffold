server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # multer's fileSize limit is 5MB (server/src/middleware/upload.ts) — keep
    # this above that so nginx is never a tighter ceiling than the app itself.
    client_max_body_size 6m;

    # A static `proxy_pass http://server:8080` resolves the "server" hostname
    # once at nginx worker startup and caches it. If the server container is
    # ever recreated (redeploy, crash + restart: unless-stopped), that cached
    # IP goes stale and every request 502s until nginx itself is restarted.
    # Routing through a variable forces nginx to re-resolve via Docker's
    # embedded DNS (127.0.0.11) on every request instead.
    resolver 127.0.0.11 valid=10s;
    set $server_upstream server:8080;

    location /api/ {
        # proxy_pass's automatic "replace the matched location prefix" rewrite
        # only works with a static, compile-time-known URI. Once the target
        # is a variable (needed for the dynamic resolver above), that rewrite
        # silently stops happening — nginx forwards only the literal text
        # after the variable and drops everything past it. $request_uri is
        # the client's exact original path; forward that explicitly instead.
        proxy_pass http://$server_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://$server_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
