name: scaffold

services:
  postgres:
    image: postgres:16
    container_name: scaffold-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scaffold-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: scaffold-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      # server/.env uses localhost for non-Docker dev; override to reach the
      # sibling containers by service name. Set DATABASE_URL/REDIS_URL in root
      # .env to point at an external DB/Redis instead — takes priority.
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      # Loopback-only — nginx reaches server via Docker's internal network
      # regardless; this just keeps the host port off the LAN/internet.
      - '127.0.0.1:8080:8080'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/health']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s # migrate deploy + db seed run before the app starts listening
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./server
    container_name: scaffold-worker
    restart: unless-stopped
    command: ['node', 'dist/worker.js']
    env_file: ./server/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    container_name: scaffold-client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
